# Category distribution target (customer plan A.2):
#   single_hop  ~30%  (one entity / direct-property lookup)
#   multi_hop   ~40%  (requires 2+ relationship traversals; gold_path set)
#   negative    ~20%  (no answer in corpus; gold_answer MUST be null)
#   ambiguous   ~10%  (multiple defensible answers; pick one canonical)

