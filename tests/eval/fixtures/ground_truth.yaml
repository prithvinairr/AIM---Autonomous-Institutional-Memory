# AIM benchmark harness — ground-truth fixture (Phase A.2)
#
# Source of truth: aim/scripts/seed_demo.py ("Nexus Technologies" demo corpus).
# Every fact asserted below is verifiable from that seed script.
#
# Entity id convention:
#   gold_entities / gold_path values use the SLUG form (e.g. "sarah-chen",
#   "svc-auth", "adr-003") — the same string passed to the seed's `_id()`
#   helper. The harness projects these slugs to the real UUIDs at eval time
#   via `uuid.uuid5(NAMESPACE_DNS, f"nexus.demo.{slug}")`. Slugs are used
#   here so humans can diff-review the fixture without decoding UUIDs.
